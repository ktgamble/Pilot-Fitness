<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Hotel Gym"/>
<title>Hotel Gym Workout</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;padding:20px 14px 48px;max-width:680px;margin:0 auto}
button{cursor:pointer;font-family:inherit}
.eyebrow{font-size:13px;letter-spacing:3px;color:#475569;text-transform:uppercase;margin-bottom:5px;text-align:center}
h1{font-size:28px;font-weight:800;text-align:center}
.subtitle{font-size:15px;color:#64748b;margin-top:4px;text-align:center;margin-bottom:24px}
.ab-toggle{display:flex;gap:8px;background:#1e293b;border-radius:12px;padding:5px;margin-bottom:16px}
.ab-btn{flex:1;padding:14px 0;border-radius:8px;border:none;font-weight:700;font-size:17px;transition:background 0.2s,color 0.2s;background:transparent;color:#64748b}
.ab-btn.active-a{background:#6366f1;color:#fff}
.ab-btn.active-b{background:#10b981;color:#fff}
.card{background:#1e293b;border-radius:14px;padding:16px 18px;margin-bottom:12px}
.card-label{font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.timeline{display:flex;gap:5px;margin-top:10px}
.tl-seg{text-align:center}
.tl-box{border-radius:7px;padding:8px 3px;margin-bottom:4px}
.tl-time{font-size:14px;font-weight:700}
.tl-lbl{font-size:12px;color:#475569}
.row{display:flex;gap:10px;align-items:center;margin-bottom:8px}
.row-time{font-size:14px;font-weight:700;min-width:44px}
.row-desc{font-size:15px;color:#94a3b8}
.cardio-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.cardio-name{font-size:21px;font-weight:800}
.cardio-meta{display:flex;gap:8px;margin-top:5px;align-items:center;flex-wrap:wrap}
.badge{font-size:13px;font-weight:700;border-radius:6px;padding:3px 10px;border:1px solid}
.count{font-size:13px;color:#475569}
.dice-btn{border-radius:9px;padding:9px 14px;font-size:14px;font-weight:700;border:1px solid;background:transparent;white-space:nowrap}
.goal{font-size:15px;color:#94a3b8;font-style:italic;margin-bottom:12px}
.zone-legend{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.zone-badge{font-size:14px;font-weight:700;border-radius:5px;padding:4px 11px;border:1px solid}
.interval-row{display:flex;gap:8px;align-items:center;padding:12px 14px;background:#0f172a;border-radius:8px;margin-bottom:4px;border-left:3px solid}
.iv-time{font-size:18px;font-weight:700;min-width:100px}
.iv-desc{flex:1;font-size:20px;font-weight:600}
.speeds-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.speed-field{background:#0f172a;border-radius:10px;padding:11px 13px;display:flex;flex-direction:column;gap:5px}
.speed-field-label{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.speed-input{background:transparent;border:none;border-bottom:1px solid #334155;color:#f1f5f9;font-size:22px;font-weight:700;width:100%;outline:none;padding:2px 0;font-family:inherit}
.speed-input::placeholder{color:#334155}
.circuit-btn{width:100%;display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:transparent;border:none;color:#f1f5f9;text-align:left}
.circuit-label{font-size:17px;font-weight:700}
.circuit-timing{font-size:14px;color:#475569;margin-top:2px}
.circuit-wrap{background:#0f172a;border-radius:11px;overflow:hidden;margin-bottom:8px}
.circuit-body{padding:0 14px 14px;display:flex;flex-direction:column;gap:8px}
.lift-card{padding:13px 14px;border-radius:9px;border:1px solid}
.lift-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.lift-meta{display:flex;gap:7px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.cat-badge{font-size:13px;font-weight:700;border-radius:5px;padding:3px 9px;border:1px solid}
.lift-slot{font-size:13px;color:#475569}
.lift-name{font-size:20px;font-weight:700}
.lift-note{font-size:14px;color:#64748b;margin-top:4px}
.reps-box{border-radius:7px;padding:7px 11px;text-align:center;white-space:nowrap;border:1px solid;flex-shrink:0}
.reps-txt{font-size:14px;font-weight:700}
.equip-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.equip-btn{padding:8px 15px;border-radius:8px;font-size:14px;font-weight:700;border:1px solid}
.equip-hint{font-size:12px;color:#334155}
.circuits-sub{font-size:14px;color:#64748b;margin-bottom:14px}
.lift-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.footer{text-align:center;margin-top:20px;font-size:10px;color:#1e293b}
.complete-wrap{text-align:center;margin-top:24px}
.complete-btn{background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:14px;padding:18px 48px;color:#fff;font-size:18px;font-weight:800;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 24px #10b98140;width:100%;max-width:320px}
.complete-hint{font-size:13px;color:#334155;margin-top:8px}
.section-main{font-size:17px;font-weight:600}
.section-sub{font-size:15px;color:#94a3b8;margin-top:4px}

</head>
<body>
<div id="app"></div>
<script>
// ─── POOLS ───────────────────────────────────────────────────────────────────
const pools = {
  push:       { reps:"12–15 reps", exercises:["Wide Grip Push-up","Diamond Push-up","Tyson Push-up","Dive Bomber Push-up","Push-up","Bench Press","Incline Press","Shoulder Press"] },
  pushNoSh:   { reps:"12–15 reps", exercises:["Wide Grip Push-up","Diamond Push-up","Tyson Push-up","Dive Bomber Push-up","Push-up","Bench Press","Incline Press"] },
  pull:       { reps:"10–15 reps", exercises:["Row","Bicep Curl","Hammer Curl","Zottman Curl","Face Pull"] },
  pullBar:    { reps:"8–12 reps",  exercises:["Pull-up","Chin-up"] },
  leg:        { reps:"12–15 reps", exercises:["Goblet Squat","Cossack Squat","Reverse Lunge","Walking Lunge"] },
  legB:       { reps:"12–15 reps", exercises:["Goblet Squat","Cossack Squat","Reverse Lunge","Walking Lunge"] },
  hinge:      { reps:"10–15 reps", exercises:["Snatch","RDL","Single Leg RDL","DB Clean"] },
  carry:      { reps:"30–40 sec each side", exercises:["Single Side Farmers Carry","Overhead Carry"] },
  rotate:     { reps:"15–20 reps", exercises:["Dumbbell Figure 8","Bend and Twist","Around the World","Kneeling Rotation"] },
  jump:       { reps:"10–15 reps", exercises:["Squat Jump","Vertical Jump"] },
};

function pick(pool, exclude=[]) {
  const opts = pools[pool].exercises.filter(e=>!exclude.includes(e));
  return opts[Math.floor(Math.random()*opts.length)];
}

// Random carry or rotate
function pickCR() {
  const pool=Math.random()<0.5?"carry":"rotate";
  return {pool, ex:pick(pool)};
}

// ─── WORKOUT GENERATORS ──────────────────────────────────────────────────────
// Circuits 1 & 2: 4 lifts — Lifts 1&2 always superset, Lifts 3&4 straight sets
// Circuit 3: 3 lifts — all straight sets
// Jump appears exactly once, randomly in C1, C2, or C3

function generateA({withPullBar=false}={}) {
  const push1=pick("pushNoSh"), push2=pick("pushNoSh",[push1]);
  const push3=pick("push",[push1,push2]);
  const push4=withPullBar?pick("pullBar"):pick("push",[push1,push2,push3]);
  const leg2=pick("leg"), leg3=pick("leg",[leg2]);
  const cr1=pickCR(), cr2=pickCR(), cr3=pickCR();
  const jump=pick("jump");
  const jc=Math.floor(Math.random()*3); // which circuit gets the jump

  return [
    { label:"Lift Circuit 1 — Squat Press + Push", timing:"3 rounds · 4 lifts", lifts:[
      {slot:"Lift 1",cat:"Leg",            ex:"Squat Press",reps:"10–15 reps",        note:"Superset with Lift 2 — no rest between"},
      {slot:"Lift 2",cat:"Push (Superset)",ex:push1,        reps:pools.pushNoSh.reps, note:"Rest 60s after superset"},
      {slot:"Lift 3",cat:"Push",           ex:push2,        reps:pools.pushNoSh.reps, note:"Rest 60s after"},
      jc===0
        ? {slot:"Lift 4",cat:"Jump",ex:jump,reps:pools.jump.reps,note:"Rest 60s, then begin Circuit 2"}
        : {slot:"Lift 4",cat:cr1.pool.charAt(0).toUpperCase()+cr1.pool.slice(1),ex:cr1.ex,reps:pools[cr1.pool].reps,note:"Rest 60s, then begin Circuit 2"},
    ]},
    { label:"Lift Circuit 2 — Push + Leg", timing:"3 rounds · 4 lifts", lifts:[
      {slot:"Lift 1",cat:"Push",           ex:push3,reps:pools.push.reps,note:"Superset with Lift 2 — no rest between"},
      {slot:"Lift 2",cat:"Leg (Superset)", ex:leg2, reps:pools.leg.reps, note:"Rest 60s after superset"},
      {slot:"Lift 3",cat:"Leg",            ex:leg3, reps:pools.leg.reps, note:"Rest 60s after"},
      jc===1
        ? {slot:"Lift 4",cat:"Jump",ex:jump,reps:pools.jump.reps,note:"Rest 60s, then begin Circuit 3"}
        : {slot:"Lift 4",cat:cr2.pool.charAt(0).toUpperCase()+cr2.pool.slice(1),ex:cr2.ex,reps:pools[cr2.pool].reps,note:"Rest 60s, then begin Circuit 3"},
    ]},
    { label:"Lift Circuit 3 — Push Finisher", timing:"3 rounds · 3 lifts", lifts:[
      {slot:"Lift 1",cat:"Push",ex:push4,reps:withPullBar?pools.pullBar.reps:pools.push.reps,note:"Rest 60s after"},
      {slot:"Lift 2",cat:cr3.pool.charAt(0).toUpperCase()+cr3.pool.slice(1),ex:cr3.ex,reps:pools[cr3.pool].reps,note:"Rest 60s after"},
      jc===2
        ? {slot:"Lift 3",cat:"Jump",ex:jump,reps:pools.jump.reps,note:"Finisher — rest as needed"}
        : {slot:"Lift 3",cat:"Leg",ex:pick("leg",[leg2,leg3]),reps:pools.leg.reps,note:"Finisher — rest as needed"},
    ]},
  ];
}

function generateB({withPullBar=false}={}) {
  const pull1=withPullBar?pick("pullBar"):pick("pull");
  const pull2=withPullBar?pick("pullBar",[pull1]):pick("pull",[pull1]);
  const pull3=pick("pull",[pull1,pull2]);
  const pull4=pick("pull",[pull1,pull2,pull3]);
  const hinge1=pick("hinge"), hinge2=pick("hinge",[hinge1]), hinge3=pick("hinge",[hinge1,hinge2]);
  const cr1=pickCR(), cr2=pickCR(), cr3=pickCR();
  const jump=pick("jump");
  const jc=Math.floor(Math.random()*3);
  const pullReps=withPullBar?pools.pullBar.reps:pools.pull.reps;

  return [
    { label:"Lift Circuit 1 — Pull + Hinge", timing:"3 rounds · 4 lifts", lifts:[
      {slot:"Lift 1",cat:"Pull",            ex:pull1,  reps:pullReps,        note:"Superset with Lift 2 — no rest between"},
      {slot:"Lift 2",cat:"Pull (Superset)", ex:pull2,  reps:pullReps,        note:"Rest 60s after superset"},
      {slot:"Lift 3",cat:"Hinge",           ex:hinge1, reps:pools.hinge.reps,note:"Rest 60s after"},
      jc===0
        ? {slot:"Lift 4",cat:"Jump",ex:jump,reps:pools.jump.reps,note:"Rest 60s, then begin Circuit 2"}
        : {slot:"Lift 4",cat:cr1.pool.charAt(0).toUpperCase()+cr1.pool.slice(1),ex:cr1.ex,reps:pools[cr1.pool].reps,note:"Rest 60s, then begin Circuit 2"},
    ]},
    { label:"Lift Circuit 2 — Pull + Hinge", timing:"3 rounds · 4 lifts", lifts:[
      {slot:"Lift 1",cat:"Pull",             ex:pull3,  reps:pools.pull.reps, note:"Superset with Lift 2 — no rest between"},
      {slot:"Lift 2",cat:"Hinge (Superset)", ex:hinge2, reps:pools.hinge.reps,note:"Rest 60s after superset"},
      {slot:"Lift 3",cat:"Hinge",            ex:hinge3, reps:pools.hinge.reps,note:"Rest 60s after"},
      jc===1
        ? {slot:"Lift 4",cat:"Jump",ex:jump,reps:pools.jump.reps,note:"Rest 60s, then begin Circuit 3"}
        : {slot:"Lift 4",cat:cr2.pool.charAt(0).toUpperCase()+cr2.pool.slice(1),ex:cr2.ex,reps:pools[cr2.pool].reps,note:"Rest 60s, then begin Circuit 3"},
    ]},
    { label:"Lift Circuit 3 — Pull + Hinge Finisher", timing:"3 rounds · 3 lifts", lifts:[
      {slot:"Lift 1",cat:"Pull",  ex:pull4,  reps:pools.pull.reps,  note:"Rest 60s after"},
      {slot:"Lift 2",cat:"Hinge", ex:pick("hinge",[hinge1,hinge2,hinge3]), reps:pools.hinge.reps, note:"Rest 60s after"},
      jc===2
        ? {slot:"Lift 3",cat:"Jump",ex:jump,reps:pools.jump.reps,note:"Finisher — rest as needed"}
        : {slot:"Lift 3",cat:cr3.pool.charAt(0).toUpperCase()+cr3.pool.slice(1),ex:cr3.ex,reps:pools[cr3.pool].reps,note:"Finisher — rest as needed"},
    ]},
  ];
}

// ─── CARDIO POOLS ────────────────────────────────────────────────────────────
// Workout A: Sprint workouts only (4 types)
// Workout B: OTF Treadmill only (8 types)

const sprintPool = [
  { name:"Sprint Ladder", machine:"Treadmill", type:"Sprint",
    goal:"Each sprint gets longer — push harder to maintain intensity as duration grows.",
    intervals:[
      {time:"0:00–2:00", zone:"Walk",   desc:"Warm-up walk"},
      {time:"2:00–2:10", zone:"AllOut", desc:"10s sprint — all out"},
      {time:"2:10–3:00", zone:"Walk",   desc:"50s recovery walk"},
      {time:"3:00–3:20", zone:"AllOut", desc:"20s sprint"},
      {time:"3:20–4:10", zone:"Walk",   desc:"50s recovery walk"},
      {time:"4:10–4:40", zone:"AllOut", desc:"30s sprint"},
      {time:"4:40–5:40", zone:"Walk",   desc:"60s recovery walk"},
      {time:"5:40–6:10", zone:"AllOut", desc:"30s sprint — push harder"},
      {time:"6:10–7:10", zone:"Walk",   desc:"60s recovery walk"},
      {time:"7:10–7:50", zone:"AllOut", desc:"40s sprint"},
      {time:"7:50–9:00", zone:"Walk",   desc:"70s recovery walk"},
      {time:"9:00–9:45", zone:"AllOut", desc:"45s sprint — best effort"},
      {time:"9:45–11:00",zone:"Walk",   desc:"75s recovery walk"},
      {time:"11:00–11:30",zone:"AllOut",desc:"30s all out finisher"},
      {time:"11:30–13:00",zone:"Walk",  desc:"90s recovery walk"},
      {time:"13:00–13:20",zone:"AllOut",desc:"20s max effort"},
      {time:"13:20–15:00",zone:"Walk",  desc:"Cool-down walk"},
    ]},
  { name:"Sprint Tabata", machine:"Treadmill", type:"Sprint",
    goal:"20s on / 10s off — pure speed. Hold your intensity across all 3 rounds.",
    intervals:[
      {time:"0:00–2:00", zone:"Walk",   desc:"Warm-up walk"},
      {time:"2:00–2:20", zone:"AllOut", desc:"20s sprint"},

      {time:"3:00–3:20", zone:"AllOut", desc:"20s sprint"},

      {time:"10:30–10:50",zone:"AllOut",desc:"20s sprint"},

      {time:"7:30–9:00", zone:"Walk",   desc:"90s recovery"},

      {time:"13:00–13:30",zone:"AllOut",desc:"30s sprint — final"},
      {time:"13:30–15:00",zone:"Walk",  desc:"Cool-down walk"},
    ]},
];

const otfPool = [
  { name:"Pyramid Push", machine:"Treadmill", type:"OTF",
    goal:"Build speed each push interval, hold your base between.",
    intervals:[
      {time:"0:00–1:30", zone:"Base",   desc:"Warm-up jog"},
      {time:"1:30–2:30", zone:"Push",   desc:"Push interval"},
      {time:"2:30–3:30", zone:"Base",   desc:"Recovery base"},
      {time:"3:30–4:30", zone:"Push",   desc:"Push — increase speed"},
      {time:"4:30–5:30", zone:"Base",   desc:"Recovery base"},
      {time:"5:30–6:15", zone:"AllOut", desc:"All Out sprint"},
      {time:"6:15–7:15", zone:"Base",   desc:"Recovery walk"},
      {time:"7:15–8:15", zone:"Push",   desc:"Push — match or beat"},
      {time:"8:15–9:15", zone:"Base",   desc:"Recovery base"},
      {time:"9:15–10:15",zone:"Push",   desc:"Push — increase"},
      {time:"10:15–11:15",zone:"Base",  desc:"Recovery base"},
      {time:"11:15–12:00",zone:"AllOut",desc:"All Out — best effort"},
      {time:"12:00–13:30",zone:"Walk",  desc:"Recovery walk"},
      {time:"13:30–14:30",zone:"AllOut",desc:"Final All Out"},
      {time:"14:30–15:00",zone:"Walk",  desc:"Cool-down walk"},
    ]},
  { name:"30/60/90", machine:"Treadmill", type:"OTF",
    goal:"Short hard efforts — keep all outs as true sprints.",
    intervals:[

      {time:"10:30–12:00",zone:"Walk",  desc:"90s Walking recovery"},
      {time:"12:00–13:00",zone:"AllOut",desc:"60s All Out — best of day"},
      {time:"13:00–15:00",zone:"Walk",  desc:"Cool-down walk"},
    ]},
  { name:"Build & Burn", machine:"Treadmill", type:"OTF",
    goal:"Increase pace every minute of the build — hold it in the burn.",
    intervals:[
      {time:"0:00–1:30", zone:"Base",   desc:"Warm-up jog"},

function randSprint(exclude=-1) {
  let idx, tries=0;
  do { idx=Math.floor(Math.random()*sprintPool.length); tries++; }
  while(idx===exclude && tries<20);
  return idx;
}
function randOTF(exclude=-1) {
  let idx, tries=0;
  do { idx=Math.floor(Math.random()*otfPool.length); tries++; }
  while(idx===exclude && tries<20);
  return idx;
}

// ─── COLORS ──────────────────────────────────────────────────────────────────
const zoneStyle = {
  Base:   {border:"#0ea5e940",text:"#0ea5e9"},
  Push:   {border:"#f59e0b40",text:"#f59e0b"},
  AllOut: {border:"#ef444440",text:"#ef4444"},
  Walk:   {border:"#64748b40",text:"#64748b"},
};
const typeColor  = {OTF:"#f59e0b",Sprint:"#ef4444",Elliptical:"#0ea5e9"};
const machineIcon = {Treadmill:"🏃",Sprint:"⚡",Elliptical:"〇"};
const catColor   = {
  "Push":"#38bdf8","Push (Superset)":"#38bdf8",
  "Pull":"#34d399","Pull (Superset)":"#34d399",
  "Leg":"#a78bfa","Leg (Superset)":"#a78bfa",
  "Hinge":"#fb923c","Hinge (Superset)":"#fb923c",
  "Carry":"#facc15","Rotate":"#f472b6",
  "Jump":"#4ade80",
};

// ─── STATE ───────────────────────────────────────────────────────────────────
const SAVE_KEY = "hotel-gym-v1";
const _iA=randSprint(), _iB=randOTF();
let state = {
  workout:     "A",
  sprintIdxA:  _iA,
  otfIdxB:     _iB,
  withPullBar: false,
  roundsA:     generateA(),
  roundsB:    generateB(),
  expanded:   0,
  speeds:     {walk:"",base:"",push:"",allout:""},
};

function loadState() {
  try {
    const s=JSON.parse(localStorage.getItem(SAVE_KEY));
    if(!s) return;
    if(s.workout)                         state.workout    =s.workout;
    if(typeof s.sprintIdxA==="number")    state.sprintIdxA =s.sprintIdxA;
    if(typeof s.otfIdxB==="number")       state.otfIdxB    =s.otfIdxB;
    if(typeof s.withPullBar==="boolean")  state.withPullBar=s.withPullBar;
    if(s.roundsA)                         state.roundsA    =s.roundsA;
    if(s.roundsB)                         state.roundsB    =s.roundsB;
    if(s.speeds)                          state.speeds     =s.speeds;
  } catch(e){}
}

function saveState() {
  try {
    localStorage.setItem(SAVE_KEY,JSON.stringify({
      workout:state.workout, sprintIdxA:state.sprintIdxA, otfIdxB:state.otfIdxB,
      withPullBar:state.withPullBar, roundsA:state.roundsA, roundsB:state.roundsB, speeds:state.speeds,
    }));
  } catch(e){}
}

// ─── RENDER HELPERS ──────────────────────────────────────────────────────────
function el(tag,attrs,children) {
  const e=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})) {
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  if(typeof children==="string") e.textContent=children;
  else if(Array.isArray(children)) children.forEach(c=>c&&e.appendChild(typeof c==="string"?document.createTextNode(c):c));
  return e;
}
function div(cls,children,style){const e=el("div",{class:cls||""},children);if(style)Object.assign(e.style,style);return e;}
function span(cls,text,style){const e=el("span",{class:cls||""},text);if(style)Object.assign(e.style,style);return e;}
function btn(cls,text,onclick,style){
  const b=el("button",{class:cls||""},text);
  b.addEventListener("click",onclick);
  if(style) Object.assign(b.style,style);
  return b;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const app=document.getElementById("app");
  app.innerHTML="";
  const w  =state.workout;
  const acc=w==="A"?"#6366f1":"#10b981";
  const rounds=w==="A"?state.roundsA:state.roundsB;
  const cidx=w==="A"?state.sprintIdxA:state.otfIdxB;
  const cardio=w==="A"?sprintPool[cidx]:otfPool[cidx];
  const tc=typeColor[cardio.type];

  // Header
  const hdr=div("");
  hdr.innerHTML=`<div class="eyebrow">Hotel Gym System</div><h1>Hotel Gym Workout</h1><div class="subtitle">A = Sprints · B = OTF Treadmill · Supersets</div>`;
  app.appendChild(hdr);

  // A/B Toggle
  const tog=div("ab-toggle");
  const bA=btn("ab-btn","Workout A — Push / Legs",()=>{state.workout="A";state.expanded=0;saveState();render();});
  const bB=btn("ab-btn","Workout B — Pull / Hinge",()=>{state.workout="B";state.expanded=0;saveState();render();});
  if(w==="A") bA.classList.add("active-a"); else bB.classList.add("active-b");
  tog.appendChild(bA); tog.appendChild(bB); app.appendChild(tog);

  // Timeline
  const tlCard=div("card");
  const tlLbl=div("card-label","Session Timeline"); tlLbl.style.color="#475569"; tlCard.appendChild(tlLbl);
  const tl=div("timeline");
  [{l:"Warmup",t:"4m",c:"#0ea5e9",f:1},{l:"Cardio",t:"15m",c:"#f59e0b",f:2},{l:"Setup",t:"4m",c:"#475569",f:1},{l:"Lift",t:"33m",c:"#10b981",f:3}]
    .forEach(s=>{
      const seg=div("tl-seg"); seg.style.flex=s.f;
      const box=div("tl-box"); box.style.cssText=`background:${s.c}20;border:1px solid ${s.c}50`;
      const t=div("tl-time",s.t); t.style.color=s.c; box.appendChild(t); seg.appendChild(box);
      seg.appendChild(div("tl-lbl",s.l)); tl.appendChild(seg);
    });
  tlCard.appendChild(tl); app.appendChild(tlCard);

  // Warmup
  const wu=div("card"); wu.style.borderLeft="3px solid #0ea5e9";
  const wl=div("card-label","Step 1 · Warm-up · 4 min"); wl.style.color="#0ea5e9"; wu.appendChild(wl);
  [["1 min","Arm circles, shoulder rolls, neck rolls"],["1 min","Hip openers, leg swings, ankle circles"],
   ["1 min","Bodyweight squats ×10, inchworms ×5"],["1 min","Light jog or jump rope in place"]]
    .forEach(([t,d])=>{
      const r=div("row");
      const tm=div("row-time",t); tm.style.color="#0ea5e9"; r.appendChild(tm);
      r.appendChild(div("row-desc",d)); wu.appendChild(r);
    });
  app.appendChild(wu);

  // Cardio
  const cc=div("card"); cc.style.borderLeft=`3px solid ${tc}`;
  const ch=div("cardio-header");
  const cinfo=div("");
  const clbl=div("card-label",`Step 2 · ${w==="A"?"Sprint":"OTF Treadmill"} · 15 min`); clbl.style.color=tc; cinfo.appendChild(clbl);
  cinfo.appendChild(el("div",{class:"cardio-name"},`${machineIcon[cardio.machine]} ${cardio.name}`));
  const cmeta=div("cardio-meta");
  const cbadge=span("badge",cardio.type); cbadge.style.cssText=`color:${tc};background:${tc}20;border-color:${tc}40`;
  cmeta.appendChild(cbadge);
  cmeta.appendChild(span("count",`#${cidx+1} of ${w==="A"?sprintPool.length:otfPool.length}`));
  cinfo.appendChild(cmeta); ch.appendChild(cinfo);
  const cdice=btn("dice-btn","🎲 New",()=>{
    if(w==="A") state.sprintIdxA=randSprint(state.sprintIdxA);
    else state.otfIdxB=randOTF(state.otfIdxB);
    saveState(); render();
  }); cdice.style.cssText=`color:${tc};background:${tc}20;border-color:${tc}50`;
  ch.appendChild(cdice); cc.appendChild(ch);
  cc.appendChild(el("div",{class:"goal"},`Goal: ${cardio.goal}`));

  // Speed inputs
  const sg=div("speeds-grid");
  [{key:"walk",label:"Walk",color:"#64748b"},{key:"base",label:"Base",color:"#0ea5e9"},
   {key:"push",label:"Push",color:"#f59e0b"},{key:"allout",label:"All Out",color:"#ef4444"}]
    .forEach(({key,label,color})=>{
      const sf=div("speed-field"); sf.style.borderLeft=`3px solid ${color}40`;
      const sl=span("speed-field-label",label); sl.style.color=color;
      const si=el("input",{type:"tel",placeholder:"mph / level",class:"speed-input"});
      si.value=state.speeds[key]||"";
      si.addEventListener("input",()=>{state.speeds[key]=si.value;saveState();});
      sf.appendChild(sl); sf.appendChild(si); sg.appendChild(sf);
    });
  cc.appendChild(sg);

  // Zone legend
  const zl=div("zone-legend");
  [["Walk","#64748b"],["Base","#0ea5e9"],["Push","#f59e0b"],["All Out","#ef4444"]].forEach(([z,c])=>{
    const zb=span("zone-badge",z); zb.style.cssText=`color:${c};background:${c}12;border-color:${c}40`;
    zl.appendChild(zb);
  });
  cc.appendChild(zl);

  // Intervals
  cardio.intervals.forEach(iv=>{
    const zs=zoneStyle[iv.zone]||zoneStyle.Base;
    const row=div("interval-row"); row.style.borderLeftColor=zs.border;
    const it=span("iv-time",iv.time); it.style.color=zs.text;
    row.appendChild(it); row.appendChild(span("iv-desc",iv.desc));
    cc.appendChild(row);
  });
  app.appendChild(cc);

  // Transition
  const tr=div("card"); tr.style.borderLeft="3px solid #475569";
  const trl=div("card-label","Step 3 · Transition & Setup · 4 min"); trl.style.color="#475569"; tr.appendChild(trl);
  tr.appendChild(el("div",{class:"section-sub"},"Hydrate, set up weights. Lock in your first superset mentally."));
  app.appendChild(tr);

  // Lift Block
  const lb=div("card"); lb.style.borderLeft=`3px solid ${acc}`;
  const lh=div("lift-header");
  const ll=div("card-label","Step 4 · Lift Block · 33 min"); ll.style.color=acc; lh.appendChild(ll);
  const ldice=btn("dice-btn","🎲 New Exercises",()=>{
    if(w==="A") state.roundsA=generateA({withPullBar:state.withPullBar});
    else state.roundsB=generateB({withPullBar:state.withPullBar});
    state.expanded=0; saveState(); render();
  }); ldice.style.cssText=`color:${acc};background:${acc}20;border-color:${acc}50`;
  lh.appendChild(ldice); lb.appendChild(lh);

  // Pull bar toggle
  const eq=div("equip-row");
  const pbBtn=btn("equip-btn",`${state.withPullBar?"✓":"+"} Pull-up Bar`,()=>{
    state.withPullBar=!state.withPullBar;
    if(w==="A") state.roundsA=generateA({withPullBar:state.withPullBar});
    else state.roundsB=generateB({withPullBar:state.withPullBar});
    state.expanded=0; saveState(); render();
  }); pbBtn.style.cssText=state.withPullBar?`color:#34d399;background:#34d39920;border-color:#34d39980`:`color:#64748b;background:transparent;border-color:#334155`;
  eq.appendChild(pbBtn);
  eq.appendChild(span("equip-hint","tap if pull-up bar is available"));
  lb.appendChild(eq);
  lb.appendChild(el("div",{class:"circuits-sub"},"3 lift circuits · 3 rounds each · ~18 min lifting · ~15 min rest & setup"));

  rounds.forEach((circuit,ri)=>{
    const cw=div("circuit-wrap");
    const cb=btn("circuit-btn","",()=>{state.expanded=(state.expanded===ri?-1:ri);render();});
    const ct=div("");
    ct.appendChild(el("div",{class:"circuit-label"},circuit.label));
    ct.appendChild(el("div",{class:"circuit-timing"},circuit.timing));
    cb.appendChild(ct);
    const arr=span("",state.expanded===ri?"▲":"▼"); arr.style.cssText=`color:${acc};font-size:14px;flex-shrink:0`;
    cb.appendChild(arr); cw.appendChild(cb);

    if(state.expanded===ri){
      const cbody=div("circuit-body");
      circuit.lifts.forEach(lift=>{
        const cc2=catColor[lift.cat]||"#94a3b8";
        const isSS=lift.cat.includes("Superset");
        const lc=div("lift-card"); lc.style.cssText=`background:${isSS?cc2+"0d":"#1e293b"};border-color:${isSS?cc2+"30":"#1e293b"}`;
        const lt=div("lift-top");
        const li=div("");
        const lm=div("lift-meta");
        const cb2=span("cat-badge",lift.cat); cb2.style.cssText=`color:${cc2};background:${cc2}20;border-color:${cc2}40`;
        lm.appendChild(cb2); lm.appendChild(span("lift-slot",lift.slot)); li.appendChild(lm);
        li.appendChild(el("div",{class:"lift-name"},lift.ex));
        li.appendChild(el("div",{class:"lift-note"},lift.note));
        const rb=div("reps-box"); rb.style.cssText=`background:${cc2}20;border-color:${cc2}40`;
        const rt=div("reps-txt",lift.reps); rt.style.color=cc2; rb.appendChild(rt);
        lt.appendChild(li); lt.appendChild(rb); lc.appendChild(lt); cbody.appendChild(lc);
      });
      cw.appendChild(cbody);
    }
    lb.appendChild(cw);
  });
  app.appendChild(lb);

  // Complete
  const cw=div("complete-wrap");
  const cb2=btn("complete-btn","✓ COMPLETE WORKOUT",()=>{
    if(w==="A"){state.sprintIdxA=randSprint(state.sprintIdxA);state.roundsA=generateA({withPullBar:state.withPullBar});}
    else{state.otfIdxB=randOTF(state.otfIdxB);state.roundsB=generateB({withPullBar:state.withPullBar});}
    state.expanded=0; saveState(); render();
    window.scrollTo({top:0,behavior:"smooth"});
  });
  cw.appendChild(cb2);
  cw.appendChild(el("div",{class:"complete-hint"},"Generates next workout & saves it"));
  app.appendChild(cw);
  app.appendChild(div("footer","Hotel Gym System · A/B Rotation"));
}
